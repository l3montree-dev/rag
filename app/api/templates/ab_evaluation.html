<!DOCTYPE html>
<html>
<head>
    <title>DevGuard A/B Evaluation</title>

    <!-- Markdown + Sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <style>
        /* body as flex container for centering */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;      /* horizontal center */
            justify-content: flex-start;
            font-family: monospace;
            background: #0f172a;
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
        }

        /* container for content */
        .container {
            max-width: 1100px;
            width: 100%;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 0.9rem;
        }

        h1 {
            font-size: 2rem;
        }

        /* answers row */
        .answers {
            display: flex;
            flex-wrap: wrap;           /* wrap on small screens */
            justify-content: center; 
            gap: 20px;
            margin-top: 30px;
        }

        /* each answer box */
        .box {
            flex: 1 1 400px;
            min-width: 300px;
            max-width: 100%;
            background: #111827;
            padding: 20px;
            border: 1px solid #1f2937;
            border-radius: 8px;
            font-size: clamp(12px, 0.9vw, 14px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 0.5rem;
            background: #3b82f6;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: clamp(12px, 1vw, 14px);
        }

        button:hover {
            background: #2563eb;
        }

        /* markdown styling */
        .markdown-content {
            line-height: 1.6;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 1em;
            font-weight: bold;
        }

        .markdown-content ul {
            padding-left: 20px;
        }

        .markdown-content li {
            margin-bottom: 4px;
        }

        .markdown-content code {
            background: #1f2937;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .markdown-content pre {
            background: #1e293b;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }

        .config-label {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        @media (max-width: 700px) {
            .answers {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <h2>Question:</h2>
        <h1>{{ question }}</h1>
    </div>

    <form method="POST" action="/vote">
        <input type="hidden" name="pair_id" value="{{ pair_id }}">
        <input type="hidden" name="question" value="{{ question }}">
        <input type="hidden" name="config_a" value="{{ a.config }}">
        <input type="hidden" name="config_b" value="{{ b.config }}">

        <div class="answers">
            <div class="box">
                <div>
                    <div id="answer-a"
                         class="markdown-content"
                         data-md='{{ a.answer | tojson | safe }}'>
                    </div>
                </div>
                <button type="submit" name="winner" value="{{ a.config }}">
                    Select A
                </button>
            </div>

            <div class="box">
                <div>
                    <div id="answer-b"
                         class="markdown-content"
                         data-md='{{ b.answer | tojson | safe }}'>
                    </div>
                </div>
                <button type="submit" name="winner" value="{{ b.config }}">
                    Select B
                </button>
            </div>

        </div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    marked.setOptions({ gfm: true, breaks: true });

    ["answer-a", "answer-b"].forEach(id => {
        const element = document.getElementById(id);
        const rawMarkdown = JSON.parse(element.dataset.md);
        const html = marked.parse(rawMarkdown);
        element.innerHTML = DOMPurify.sanitize(html);
    });
});
</script>

</body>
</html>
